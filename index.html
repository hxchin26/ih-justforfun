<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CargoLink</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>CargoLink</h1>
    <p class="subtitle">Simple hackathon demo — match trucks with cargo</p>
  </header>

  <main class="main">
    <div class="tabs">
      <button class="tab active" data-tab="truck">Post Truck Availability</button>
      <button class="tab" data-tab="cargo">Post Cargo Request</button>
    </div>

    <section class="panel" id="truck-panel">
      <form id="truck-form" class="form">
        <div class="row"><label>Company name<input name="company" required></label></div>
        <div class="row"><label>From location<select name="from" required>
          <option value="">Choose state</option>
          <option>Perlis</option>
          <option>Kedah</option>
          <option>Penang</option>
          <option>Perak</option>
          <option>Selangor</option>
          <option>Kuala Lumpur</option>
          <option>Putrajaya</option>
          <option>Negeri Sembilan</option>
          <option>Melaka</option>
          <option>Johor</option>
          <option>Pahang</option>
          <option>Terengganu</option>
          <option>Kelantan</option>
        </select></label></div>
        <div class="row"><label>To location<select name="to" required>
          <option value="">Choose state</option>
          <option>Perlis</option>
          <option>Kedah</option>
          <option>Penang</option>
          <option>Perak</option>
          <option>Selangor</option>
          <option>Kuala Lumpur</option>
          <option>Putrajaya</option>
          <option>Negeri Sembilan</option>
          <option>Melaka</option>
          <option>Johor</option>
          <option>Pahang</option>
          <option>Terengganu</option>
          <option>Kelantan</option>
        </select></label></div>
        <div class="row"><label>Date<input type="date" name="date" required></label></div>
        <div class="row"><label>Truck type<input name="truckType" placeholder="e.g., 10ft van" required></label></div>
        <div class="row"><label>Available capacity (kg)<input type="number" name="capacity" min="0" required></label></div>
        <div class="row"><label>Price expectation (RM)<input type="number" name="price" min="0" step="0.01" required></label></div>
        <div class="row"><button type="submit" class="btn">Post Truck</button></div>
      </form>

      <div class="posts">
        <h2>Truck Posts</h2>
        <div id="truck-list" class="list"></div>
      </div>
    </section>

    <section class="panel hidden" id="cargo-panel">
      <form id="cargo-form" class="form">
        <div class="row"><label>Company name<input name="company" required></label></div>
        <div class="row"><label>Pickup location<select name="pickup" required>
          <option value="">Choose state</option>
          <option>Perlis</option>
          <option>Kedah</option>
          <option>Penang</option>
          <option>Perak</option>
          <option>Selangor</option>
          <option>Kuala Lumpur</option>
          <option>Putrajaya</option>
          <option>Negeri Sembilan</option>
          <option>Melaka</option>
          <option>Johor</option>
          <option>Pahang</option>
          <option>Terengganu</option>
          <option>Kelantan</option>
        </select></label></div>
        <div class="row"><label>Dropoff location<select name="dropoff" required>
          <option value="">Choose state</option>
          <option>Perlis</option>
          <option>Kedah</option>
          <option>Penang</option>
          <option>Perak</option>
          <option>Selangor</option>
          <option>Kuala Lumpur</option>
          <option>Putrajaya</option>
          <option>Negeri Sembilan</option>
          <option>Melaka</option>
          <option>Johor</option>
          <option>Pahang</option>
          <option>Terengganu</option>
          <option>Kelantan</option>
        </select></label></div>
        <div class="row"><label>Date<input type="date" name="date" required></label></div>
        <div class="row"><label>Cargo weight (kg)<input type="number" name="weight" min="0" required></label></div>
        <div class="row"><label>Cargo type<input name="cargoType" placeholder="e.g., electronics" required></label></div>
        <div class="row"><label>Budget (RM)<input type="number" name="budget" min="0" step="0.01" required></label></div>
        <div class="row"><button type="submit" class="btn">Post Cargo</button></div>
      </form>

      <div class="dashboard card">
        <h2>Available trucks dashboard</h2>
        <p class="dashboard-copy">Filter by date or period to see available truck routes on the West Malaysia map.</p>
        <div class="form grid-filter">
          <div class="row"><label>From date<input type="date" id="map-start-date"></label></div>
          <div class="row"><label>To date<input type="date" id="map-end-date"></label></div>
          <div class="row"><button type="button" id="map-refresh" class="btn">Update Map</button></div>
        </div>
        <div class="map-shell">
          <svg id="state-map" viewBox="0 0 420 520" aria-label="West Malaysia truck availability map"></svg>
        </div>
        <div class="map-legend">
          <div class="legend-item"><span class="legend-color legend-base"></span>State route network</div>
          <div class="legend-item"><span class="legend-color legend-active"></span>Available truck route</div>
        </div>
        <div id="map-list" class="map-list"></div>
      </div>

      <div class="posts">
        <h2>Cargo Posts</h2>
        <div id="cargo-list" class="list"></div>
      </div>
    </section>

  </main>

  <footer class="footer">Made with ❤️ for ImagineHack 2026</footer>

  <script src="script.js"></script>
</body>
</html>
